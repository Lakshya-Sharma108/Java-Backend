# Server
server.port=${PORT:8080}

# Database - set these as env vars on Railway
spring.datasource.url=jdbc:mysql://localhost:3306/student_manager
spring.datasource.username=root
spring.datasource.password=Subh@#123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT - set JWT_SECRET as env var in production
jwt.secret=${JWT_SECRET:mySecretKey_changeme_in_production_min32chars!!}
jwt.expiration-ms=86400000

# Admin auto-created on first startup
admin.seed.email=${ADMIN_EMAIL:admin@studentmanager.com}
admin.seed.password=${ADMIN_PASSWORD:Admin@123}