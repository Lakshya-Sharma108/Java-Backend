# ----------------------
# Server
# ----------------------
# Railway will inject PORT automatically
server.port=${PORT:8080}


# ----------------------
# Database
# ----------------------
# Use Railway environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ----------------------
# JWT
# ----------------------
jwt.secret=${JWT_SECRET:default_super_secure_dev_key_at_least_32_chars_long}
jwt.expiration-ms=86400000

# ----------------------
# Admin seed (first run)
# ----------------------
admin.seed.email=${ADMIN_EMAIL:admin@studentmanager.com}
admin.seed.password=${ADMIN_PASSWORD:Admin@123}